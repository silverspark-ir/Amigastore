name: Update Sitemap

on:
  push:
    paths:
      - 'magazines.json'
      - 'music.json'

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          echo '<url><loc>https://bookbrand.ir/</loc><changefreq>daily</changefreq><priority>1.0</priority></url>' >> sitemap.xml

          if [ -f magazines.json ]; then
            python3 -c "
          import json
          with open('magazines.json') as f:
              data = json.load(f)
          for item in data:
              if item.get('active') != False:
                  print(f'<url><loc>https://bookbrand.ir/book/{item[\"id\"]}</loc><changefreq>weekly</changefreq><priority>0.8</priority></url>')
          " >> sitemap.xml
          fi

          if [ -f music.json ]; then
            python3 -c "
          import json
          with open('music.json') as f:
              data = json.load(f)
          for item in data:
              if item.get('active') != False:
                  print(f'<url><loc>https://bookbrand.ir/music/{item[\"id\"]}</loc><changefreq>weekly</changefreq><priority>0.8</priority></url>')
          " >> sitemap.xml
          fi

          echo '</urlset>' >> sitemap.xml
          cat sitemap.xml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "🔄 Auto-update sitemap.xml"
          git push
